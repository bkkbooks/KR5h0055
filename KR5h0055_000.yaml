  text: 紫微斗數驅一
  hash: sha256:3b51162f41d6abfe6576950bdee2b32fe6a31edcb97d0dd5d645978303e3d1b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0055_HFL_000-001a, image: hfl/1114/1114-004.png}
body:
  text: 論次序一定時刻二起八字三立格局四排星辰五立坐命六起大運七起大限八書化曜九書喜忌十排吉㐫一看八字强弱日主生旺刑沖破害三合六合開殺氣化輕重淺深進退發神墓庫空亡二看立格用神財官印食傷制偏正比劫梟敗日主所生天德月德歲德德秀貴禄刃殺禄馬向背金神魁罡拱格緫論井欄倒沖飛天雜氣朝陽龍背遥巳趨乾從棄去留三看命宫空貴守命宫星三方四正運限生尅十二宫身事十二宫長生十二宫馬前殺坐墓坐禄加盤通關四看六親多寡優劣强弱死絶成敗隂錯陽差情性相貌五看行運興衰生扶剥削合尅向背墓庫啓壓六看守限星照鬼敗沖犯反吟伏吟天羅地網殺墓照正起倒灾福七看流年星宫日歲征犯吉凶星宿太歲併殺刑合日主命運生傷八看倒限神殺有無救助椽盡馬倒直難星主化曜吉凶運限倒例九看落枕安慰遭虎遇蛇吊脛自割溺水犯湯火牢獄斬絞屈死於路有無棺木十斷死命運限期年月日時刻之應推論生歲掌法十歲起於甲戌年二十甲子逆流旋三十甲寅居其位甲辰四十起期行更逄五十立甲午六十花甲在申先輪至所生年分上始知幾歲可推言右法看所生在何辰甲子即以其甲子天十順類至甲看在何辰就以此甲逆流至此生之辰即見若干歲也論小兒時刻應例子午卯酉向父生人物小巧頂中平寅申巳亥雙頂定半偏向父體中停辰戌丑未還偏頂背生於父係肥人定時刻例半夜子刻鷄鳴丑平旦寅時日出卯食時辰兮屬中己午日中未日側眇黄昏戌兮睡屬亥晡時申兮日入酉命星時刻度數緫論天庫宫子時上四刻先刻母自成計作事進退有成有敗難爲六親衣禄不足兄弟無情天貫子時中四刻無尅破作事起倒末年稱意命招六畜田財兄弟無情少靠之命子時下四刻先尅父兄弟不得力子息遲招一生勞碌作事有頭無尾只宜出祖過房六親難爲無倚之命紅鸞宫丑時上四刻無尅破衣禄足祖業招文武皆能近貴人于息有灾殃少六親和兄弟須有無情䟽之命丑時中四刻先刻父衣食不足祖業難招發達遲爲人無力多愁怨好惹是非心慈口直事不藏機兄弟六親冰炭自卓自立晩年吉也子息難爲須有宜遲丑時下四刻先刻母六親不得力兄弟亦無情心慈性直衣禄近貴藝術立心身子息稀招之命天空星寅時上四刻先尅父六親少靠少年勞碌自卓立衣食不足多憂慮晩年發福祖業稀招之命寅時中四刻無尅破爲人有成有敗有權柄衣禄足富貴性急輕怏忠直六親少倚兄弟須有情䟽子息桃花夾竹之命寅時下四刻先尅母六親不得力僧道之命勞碌身若出祖成家心常不足兄弟少倚子息遲招中末興家之命天壽宫卯時上四刻先尅父兄弟須有無情六親淡薄初年奔波進退祖業興衰作事起倒子息初虛後實卯時中四刻無尅破命招横財近貴藝術立身兄弟少倚六親無情中末富足子息有平穩之命卯時末四刻先尅母十成九敗多進退六親無靠兄弟少倚初年妻室添婚姻謀由遂意祖業稀招之命天印宫辰時上四刻無剋破一生近貴衣禄足和氣春風心行公道逢危不險兄弟睦子息不孤之命辰時中四刻先剋父衣禄辛苦祖業希䟽進退多端脚忙手亂子息不孤先敗後成家之命辰時末先刻母兄弟無六親少靠幼年奔走進退顛倒祖業難靠子息先虛後實妻宫和諧之命巳時初四刻兄弟三四有文有武大事化小逢險不怕遇難無危到處春風妻招美質子息二三初運平平晩運亨通祖業頗招之命巳時中刻先尅母爲人多計巧言詞過人有施爲兄弟森杖祖業興家中末則吉子息不孤之命巳時末四刻六親不得力兄弟無情妻室早偕子息桃花夾竹一喜一憂末後成家之命天印宫午時上四刻無尅破近貴人衣禄足祖業自文武皆能或藝術立身兄弟有無清六親冰炭子息不孤之命午時中四刻先尅父衣禄辛苦祖業稀䟽多成多敗脚手常忙先難後易兄弟不得力六親難爲子息初虛後實午時末刻先尅毋六親兄弟俱無靠十成九敗進退多端衣禄不足自卓自立祖業難招子息不孤自興家之命紫微殿駕未時上四刻無剋破兄弟有四外和氣到處春風心行平直恩中招怨出祖成家六親稀招和子息不孤祖業頗招之命天虛未時中刻先尅父衣禄足自然和氣春風心行公道恩中招怨出祖成家六親少倚兄弟情䟽祖業興衰之命未時下刻先尅母兄弟二三衣禄足心慈性直爲人有功一喜一憂也沉也浮把虎頭捉虎尾逢凶不怕遇險無危一生平穩之命天禄分宫申時上四刻無尅破爲人近貴性巧聦明逢危不險大事化小一生安穩衣禄無虧六親和兄弟畦子息不孤之命申時中先尅父六親不得力兄弟難爲自卓自立近官出入聦明祖業稀招絡成家業妻宜兩硬子必先虛申時末刻先尅母六親兄弟俱無靠妻室早諧子桃花夾竹爲人多巧多能一生平穩成家春風之命天福分宫酉時上四刻無尅破衣禄足招祖業性巧聦明作事勇猛如龍似虎文武皆通或富或貴成家之命酉時中刻先尅父兄弟少靠近貴人心行正道衣禄自然作事有頭無尾出祖成家六親少和子息不孤之命酉時末刻先尅母六親不得力兄弟亦無情一生多成多敗招怨自成家計子息遲招作事迴進退之命文昌分宫戌時上四刻先刻父兄弟不得力六親亦稀子息實又虛衣禄足心直良善有横財出祖成家少孝順自成家之命損妻換續戌時中刻先尅母爲人多計較性巧聦明好生怏樂忠良出類言詞過人有施爲六親稀和兄弟須有無祖業興家中末則吉子息不孤之命戌時末刻無尅破爲人不得力計較聦明文武皆能出家有權能主富貴六親稀兄弟有無情祖業稀招子息先虛後實也天貫分宫亥時上四刻先尅母作事略爲能六親少靠兄弟無情中未則吉自成家之命又天貫分宫亥時上四刻先尅母作事略能爲六親無靠兄弟不招出祖成家子息遲招末年得吉之命亥時中刻無尅破三十年前父母在作事起倒自有權柄逢凶不怕膽志性剛無險無危六親稀和兄弟湏有情踈祖業有之命亥時末刻先尅父衣禄不足性格和柔難爲頭夫妻六親少靠兄弟無情初年一成一敗末年方立成家之命照膽經四言十八飛星直指序十二宫分紫微天虛天貴天印天壽天空紅鸞天庫天貫文昌天福天禄四星分宫天杖天異毛頭天刃天姚在且順行天刑在酉順行天哭合太歲順排流年例太歲逼凶而入局夢入南柯流年會殺於當年歌異薤露一太歲二太陽三喪門四太隂五官符六死符七歲破八龍德九白虎十福星十一吊客十二病符凶十八星於十二宫歌子行起正逆向行數至生月便安杖異毛刃逆杖後隨生年合處哭星傍杖星宫裏起生時順數卯處安命之單從杖上起初一不問隂陽男女逆兩日之半行一宫數至生日身宫住又從未上順數子遇着生年便布紫虛貴印壽逆相逐空鸞庫貫文福禄刑酉姚丑皆順行數至生月是其星群星依此各排定禍福從頭論重輕起紫微例凢起紫微虛實印壽空鸞庫貫文福禄並從未上起子順數至本人生年安紫逆數一宫安一星假如人命寅年生從未一起子順數至酉起紫逆布虛貴印倣此起天杖例凢起天杖異毛刃並從子上起正月逆數至本人生月安杖逆布異毛刃假如正月生人在子上安杖亥上安異戌上安毛酉上安刃倣此起天刑例凢起天刑從酉上起正月順數至本人生月安天刑起天哭例凢起天哭與本人生年相合安哭子與丑合如子年生人丑上安哭安命例凢從仗星順數本人生時是印時則從子上起申順數至未逢卯便是命官安身例從杖上逆數一宫兩日半五日二宫數至本人生日安身不分男女皆逆如遇初三十三二十三初八十八二十八此六日午時不過宫未時過宫起大限例陽男隂女從命宫順數十年行一宫隂男陽女從申宫逆數十年行一宫起小運例陽男隂女從申宫逆數一年一宫隂男陽女從命宫身數一年一宫十干所屬隂陽甲丙戊庚王屬隂乙丁己辛癸屬陽論大小限限行限陷要爲火惡曜加臨禍併來更把流年推月分病如不死也傷才順排流年例一太歳二太陽三喪門四大隂五官符六死符七歳破八龍德九白虎十福星十一吊客十二病符定死生訣夫星之分野可察災祥推人之死生最難測論大人若論死生者先看天哭次看天虛在何宫照身命何宫者若天哭正臨身命更與天虛同位善星又且無力其人生下不出三五而死亦有二日而死如二星見命不見身見身不見命亦不過數歳而死身命如得善星救助則其限盡而死更看被刑刃對照同主則主惡死無善絡也限行亦此齗之不差矣假如獅子爲命其行限到之宫天哭在寳瓶對照交限之年未便可言死須及後運到子宫方可言死天哭在人馬寅宫限亦至人馬寅宫限亦至人馬寅宫亦可言死或當生聚會命宫行年又得吉曜扶持亦善矣如有稱意之事只齗哭星限到天虛則可言死矣佗放此虛主孝服若得善星可解過矣天哭則吉曜亦難免所謂遇善星同宫亦在限盡而死與惡星同居纔交限便死獨有天壽見之可以延年惟有隱德之助縱有延年之力亦不過九陽之數而巳矣一說夫惡限有天刃星不同廟旺之宫遇限行到必有親人下淚天虛到限亦如此天杖不論廟旺亦有孝服若擎天遊奕哭星亦可斷死焉古云客至罷琴書子亦希之繪此圖聲勢相忘爲義重金蘭契誼結交歟桂花香裡揮士勤寳樹堂前駐客車且得關劉今復見名芳千載播𡖥閭而癰疽既潰而大命從之覆轍相逢迷而不悟九陽星分禍福輕重紫木文木福土禄木印土壽土杖木庫土姚木在陽宫則福重而灾輕在隂宫則福輕而災重九隂星分災福輕重貴土紅金異土毛水虛水貫土刑火刃金哭金在隂宫則福重而災輕在陽宫則災重而福輕也其可不仔細推乎若在廟堂樂旺者不必拘隂陽也三台八座右此二星乃紫神之炁主北斗之權掌天機清貴之宿專世文章仕進吉慶之利身值孤數爲左輔右弼之神號曰三台八座妻宫主生離克破天宫亦照此二星照人命身或命限逢之吉利大貴亨通之兆三台星凡男女自戌上起正月順數至本人生月止起初一數至本人生日是也八座星凡男女自辰上起正月順數至本人生月止起初一數至本人生日是也龍池鳳閣右此二星乃天上德管文明之宿金星之餘主文章科甲得地凡在人身命中爲人清秀伶俐雅重温良男女逢之主攀龍附鳳功名顯逹財禄豐厚女人逢之相貌過人心能多能淫慾不足以動其心若弱宫爲福輕在强宫爲福甚重龍池凡男女生於辰上起子時順數至本人生時是也鳳閣凡男女又於戌上起子時逆數至本人生時是也夫此十八星名有論格外有大格今選如左凡人身命二宫在亥子上星不入廟名身溺江湖格男女居戌亥辰巳上名子頭羅網格身官在巳上名身入貧民格主身妻憂亡命坐刃上名磨燭爲命格多成多敗天刃天虛居卯上爲命坐富門格凡爲㐫不㐫者皆有吉事以役之也凡人遇卯時卯宫坐命者爲蛇入龍宫不問甚時但在卯宫坐命者皆好也七强宫凡吉曜加臨爲福命宫田宅妻妾官禄四宫係高强男女福德爲次强才帛爲近强也五强宫是相貌奴僕爲惡弱又陷之地兄弟爲半陷宫又爲閑極宫疾厄遷移爲次惡殺居廟爲竒九吉星入廟例紫文紅貴福禄印壽庫但得三五位與照强宫則主榮貴文昌天貴主科名文章之顯博學經典天刑樂天庫廟守命照身及四宫强必真才實德之學起群出衆之人也九凶星入廟例刑異刃杖虛哭毛姚凶星居廟樂旺照身命主爲福不居廟旺爲禍天刑居廟化爲文藻之星主才學天刃入廟主積才谷及主貪文虛耗才帛運限不宜逢之刑刃虛哭臨身命二宫男女妻妾主尅害入廟旺士終先行毛頭虛耗忌照才帛妻妾宫主傷尅妻破才大槩凶星爲禍又看凶多吉少斟酌精粹限歌斷皇天垂象地成形人事浮沉孰可明運限先看有通塞星辰須看有枯榮命宫官禄最爲强男女遷合三合方父母須高夾妻妾近强財帛疾病祥彖曰三宫兄弟稱閑極惡弱還須奴僕當相貌惡弱須記取諸餘不用苦思量限數斷歌限數行年有消息限若通時身自吉假使行年到惡星些小災患何所恤彖曰合刑刃星必遭刑機會虛哭薤露歌興果然大限將欲盡虛哭本宫見刑刃縱有吉曜照行年十死一生凡是信一命宫所宜福禄之星復得其老年老年食禄安康無疾又得吉星之助管主一曰富二曰壽三曰貴之人也是以身命偵之皆爲權印相從也若身命二宫所陷刑異哭刃姚星肢體定主殤破根刃則損己刑則傷身不然則破足折臂患耳鼻上有宿疾亦主眼目昏昧若身命偵之天空又曰天中主家道貧窘業如銷雪必主抱瞭忍饑而巳矣經云身命四空非道即僧再有惡星拱照斷爲獨立終身文星在命主聦明經云文星樂旺而賢輔當朝黑頭宰相命逢文館之星福禄臨宫主富榮經云福禄順垣功名蓋世君子見之印名成於一舉小人見之發跡非常貴壽助之終富貴貴者主筆下成名壽者因壽得禄紫紅印杖緫平平紫微百福皆從者權印相從紅覩富貴若浮雲杖進退無定天姚照命多淫慾丈夫早年貪色慾蓋因命内犯天姚女人夜半出淫奔皆因天姚居命位刑異加臨祖業傾刑異並行必有興衰之嘆無情福禄官魁天庫照時多富貴經云身命臨於庫無數錢財庫曜單行命必豐天虛作事必無成經云必主虛花人也作事如逆艇上漠多遇僧道毛頭血刃貫星惡身命值毛頭終不超哭星臨哭親庭青衫纔到手官鬼更身隨吉星救助方能免對照沖臨禍福明二財帛宫宜天庫星庫守田財作富翁庫曜卑行命必豐天貫運限身命臨此必獲横財紫微紅鸞天壽入廟旺臨財帛俱富天貴遇貫星巨富一生富貴足印星拱貫成名天陣富忌無曜沖破財主歸窠罥不休貫星常獲横財天福財帛充足主有粟陳之富也文昌財帛會輔而富集全家天貴官主富榮更彰名譽天虛守財帛進退天哭破耗入夫杖星守縱然家積千金未免中途破耗天異星守不益險假無清取財不義天哭星守破財多巧裡得來空裡去水中浮泡眼前花天刃星守財星佩刃富若浮雲毛頭星守終虛頻遭盜賊天刑星守財有虛以公營私天姚星守多因花酒賭博成財過多滯滯毛終虛刑才有虧貧窮有盜賊官事之刑耗天刃財有益庫貫之星得横財限若相逢必秘埋餘若凶星居此地終能發積也成乖財帛宫中善星在貫庫臨時福尤大不然姚異照其間一生幹事多成敗財帛宫中天庫過更加貫索無灾禍若逢刑異照其宫一生命限多成敗財帛紫福壽爲祥貫星臨之大吉昌貴印禄星財富足紅文異杖亦常常三兄弟宫宜樂旺星照之招財兄弟切不宜陷溺紫三人虛主爭宜不宜刑貴成行卬貴顯紅可招紫三人睦天虛主喧爭多見刑天貴兄弟成行天印兄弟貴顯天壽荆萼聯芳得壽天空手足難爲宜子力紅鸞有情可招天庫得力天貫不成行文昌近貴相親天福有情義讓天禄俱有名禄天杖實分情薄天異不同契則可毛頭無有則主喧爭天刃傷尅重宜子力壽相侵亦不凶星相尅庫得力貫鴈字不成行文近貴相親福成富有情義讓禄名禄杖實分異不同契毛主爭喧無刑不和爭喧刑姚刃哭主傷克分离子力歌曰兄弟宫中分貴賤虛異刑姚不喜見若逢天貴與紅鸞鴈字成行人可羨天異若臨兄弟位須招兄弟異居住假饒同祖合屋居棄别絡須兩分路天異臨兄弟須教是異生縱然合屋住常有鬧喧爭虛哭姚刑主不聽時生詫異在星辰若得紅鸞與天貴成行鴈墜自相親兄弟須逢印壽昌若逢姚異女親多紅文異杖緫先當哭刃毛刑奈若何四田宅宫宜貫庫喜星在廟旺不宜天異主𠒋父母早喪如庫星與天意同照主先破後成自立之命紫貴印祖菓盛福庫福才巳上奮發多惡克父貫得福才忌沖破壽平紅田宅盛旺文禄主多谷粟虛杖刃主先享福異破祖毛多破多成姚破祖刑自破自成哭共加庫貫二星先破後成入廟旺增產勝祖田宅空自成自立田宅見毛虛與異袒業宗才如掃地若逢庫貫照其身先破後成還自置福禄印壽多田宅姚毛刑異父母重先破後成印破吉天虛田宅到頭空五男女宫詩曰五位逢生兒孫滿眼不宜男女照臨主男女有凶惡有哭虛亦夭折多不成三日官在高强善生主福禄身躔次度兩同胎月在凶躔雙共乳紫招一二子先女後男入廟旺子孫貴顯旺地子孫四五成行貴二三子榮後代虛老來無子不成天不然飄蕩他𡖥惟喜過房之子若不子有疾庫壽印貫子息榮家紅多招女子少成福文三五子主富貴忌沖破禄主光榮改換門閭之子杖子孫不成帶成哭主尅害一二中得送終異隔煦子孫難招偏旁廪出有一也不然過房之子毛男女主祖暴凶死得地招子推福刃子孫帶疾破家業免尅害除是過房姚男女不得力飄蕩男不良女不潔刑招男女有若無主不孝得吉星同宫三子有一子送終如三合又逢惡星不招男女亦是過房女人有產厄之害貫二三子成詩曰毛頭不可居男女子媳生來如暴虎若逢天貴與紅鸞子嗣榮登自然與毛頭刑刃如凶暴倘若虛哭爲凶天若得二宫皆吉星僮僕子孫歡豫得四煞刑膚胎内須當破相天異之星主異胎若臨子息亦相乖膈胞庶出猶閑事亦主妻兒帶得來三刑尅命産前必定傷身文昌多子紫紅踈長子難招杖貫虛印壽之星招二子福星男女亦堪居六奴僕宫不宜見文昌其人智不如奴天刃天杖主有力奴哭虛見之劫自不妨紫難爲杖刃壽福禄哭貫紅禄主如僕畏懼文虛智不辨奴貴印不宜私迯走毛刑主凶惡意是然也姚異須婢得力主起奴宫不足隨娘嫁娶時須換父成持紫文不宜居奴僕虛星文不如奴智若逢杖刃須得力天刑毛頭奴僕無姚異得力須還婢庫禄多招有力奴七妻妾宫宜紅鸞天貴照臨主有美貴之妻及奴婢不宜見天異必主别離或防尅而再娶紫入垣招貴貌之妻失地招淫蕩之婦女人招夫平穩多是要道術修行善果之人男女皆有果斷虛主尅害宜遲免損亦主无妻僧道多遇貴主招美潔天妻印因妻致富加杖不老壽宜夫妻年老空不吉紅招美貌之妻庫得妻妾不宜老禄得妻貴忌惡星沖文招聦明伶俐之妻弔三方有惡星尅貫主男婚不正之妻女嫁不良之夫巳午甲亥上不悲亦主妻才福主招美良之婦犯異刑不宜杖孤剋帶疾之夫妻毛傷尅剛之妻異主傷二三亦不和睦不然主离别仍見重婚男女皆不宜刃主男因酒色傷身女有産厄之危亦主狼狽不事多見傷克刑主傷克遲可免天杖夫妻灾疾多憂防寵妾姚犯重婚亦主和又加杖異惡星主生離死别如入廟若並限逢之添壽添壽稱意事美哭多見刑克殃詩曰七宫無殺琴瑟和鳴夫妻離異見分离若得紅鸞及貴推賢妻貴子皆安定哭星至此却成悲夫妻貴印壽爲良虛刃毛刑主損傷若是三方逢惡曜也須重媾兩三場刑虛毛刃主重妻惟有紅鸞貌最竒貴姚庫禄妻才厚天異相逢主别离八疾厄宫不宜見姚異星主有駝腰屈背并掘惡疾脚紫虛貴壽姚毛空異疾纏身目手足之灾肺經喘滿哭常啾唧印紅庫貫文刃之福禄姚哭臟不寧主背曲跛足之患生時疾厄臨人馬又與鬼門同分野生陷或逢刃異刑所傷若冀併喑啞刃刑疾厄怕相逢五臟乖張療不通跛足駝腰并曲背年年哭病必相逢身星落陷處何方更出相逢最不祥八煞惡星如拱照便知精目實堪傷疾厄不可見天姚異星同喜甚蹊饒刑刃見之多疾病天貴文昌可解饒姚異毛刑須帶疾仗微福壽緫無灾吉星混雜須詳察惡曜如臨禍患來九遷移宫不宜見毛頭刑刃照臨出外多出盜賊險横之事重則至死看其有無善星救助紫出入住外方近貴虛出祖外才益印出外方才禄貴出入得貴人力壽出入外方吉利庫貫得外方才吉利紅有外才喜慶會三合才吉利是儒述九流之十文出入近貴吉利福主遷移之得三合逢吉出入聽其所欲禄多遇高貴杖不利出入毛出外路逢盜賊損害非横之事又主水厄異不得寧靜姚主出入得人和氣刃主遠行招賊刑主遠行不利若天哭逢盜賊横惡之事也哭遠行出入多招口舌是非空万事到頭歌曰遷移刑刃見毛頭出入須逢盜賊偷横死無遇吉星救若無惡曜不須憂天貴遊行遇貴頻印薇福禄可相親毛頭刑刃虛防盜也作他𡖥客鬼人十官禄宫宜見印綬文昌中科名若廟旺主權職高遷不宜虛星一生無禄紫名復金甌入廟者名達宸聦一生不息不惹是非如會鸞少年登科沖破者不貴虛主虛名竒人勢自无决斷之事貴主遇事不懼無惡者平生不善安康也印主能齊家更得地又拱合兄天貴主拜將封侯大貴之命少年登科早擁旌旗若庶人不得地者亦平息壽入廟者少年科甲慈憫群細見事遠禄同上紅負仁義主得慶主得慶好禮夾狂妄庫善規才能計等入廟者名播華夷貫一生平善决破者不利毛不怕事被决不畏哭去文文入廟者少年科名旌節君子職位清類僧道潔庶人近貴姚惡事易戒言事多事多亦詩曰天禄宫中刑杖照决配徒流未足道必然天哭更臨沖徒死傷亡凶自吊官禄刑刃不可言獄訟纏綿禍患連天印文昌居此地少年反地得高遷宫禄須逢印貴星杖微紅壽緫平平天虛刑刃無成實若遇文昌播大名十一福德宫宜見福壽印吉星更宜廟旺如凢虛星照破一生無福或在陷溺及見刑刃臨之必是耳目聾瞽瘤癖之疾紫壽紅一生衣食安康貴文衣禄清厚印播名庫財禄貫横才福堅固禄禄位杖異勞碌進退毛姚刃哭主福薄不利虛一生无財身在陷地更加刑刃照之必主耳目口鼻臂足之疾刑主勞心一怨有灾難徒配加虛哭二星决傷亡遇吉減半姚身亂心忙歌曰福德不可見天虛有福之人只此無刑異照限自然惡縱然無疾也驚危身宫清吉休愁命福德堅高不論宫福德之宫要吉星少年享用必安榮若逢惡曜印無福早尅妻奴與弟兄十二相貌宫宜見虛哭一生少灾不宜身命見之毛頭天哭同宫主有破相見貴大吉紫孤氣貴紅文美貌印威權壽古貌庫發才貫暴發虛灾疾忌沖福禄在高强宫白手榮華富貴杖後帶疾厄姚美貌清秀毛面貎醜惡哭面貌灾疾異刃刑面貌殘破帶疾厄彖曰相貌不宜見哭悲破傷容貌跛肩餘此宫若還逢此曜定生惡疾再无疑彖曰相貌不宜見異星又嫌刑刃到其中身命二宫逢此曜定生暗疾異灾攻彖曰貌宫文昌未爲良福壽加臨壽考長若遇凶星多破祖紅鸞天哭細推詳子申巳酉亥紫氣高强師巫有分高强星名紫微子上安居男子學堂學館女子織錦刺繡毛頭不加男子而冠重禄刃星不至女人貴室名珍若在巳官并酉亥運行福禄有餘名紫氣之星獨曰孤爲僧爲迦爲泛後彖曰此星落陷一世老儒人若子上見紫微富貴功名天下知刑異不來免破蕩夫妻保守頗相宜彖曰紫氣歸垣管主文章冠世紫加亥酉子巳宫富壽才名碩德翁衣紫腰金人莫比何愁官爵不榮尊彖曰紫氣逢之紫氣宸吉星同照倍精神孤宿天沖閑極位主爲僧道九流人身命逢之必壽長紫氣旺樂妙爲良貴顯相逢居翰苑更兼天刃作員郞彖曰紫氣清閑藝術人鬼畢兼帶局尤清能文能武多謀畧空裡榮華事事新紫微朂喜妙中逢財帛豐盈福禄豐子息命宫官禄位遇之多雅達亨通天虛屬氷隂象五午星名天虛身命逢渠寅申巳亥四宫有財少實多虛丑午榮華富貴若陷官禄破蕩無餘不如收拾閑風月紙帳梅花獨自眠彖曰天餘丑午真富貴巳亥寅申實多虛忽遇毛頭相照應田園万項破無餘彖曰天虛丑午位宜來廟旺相逢不生灾辭言誑心不須听臾能謀達富多財彖曰桃李無言三月春戮翠衾中誰與共天虛天上銷爍烙犯着財官半世窮若得好星來救解也須半吉半爲凶彖曰進一步與仸齊眉退一步俗緣未斷天虛入廟命身臨得地隂陽喜駐停假使惡星同拱照縱然亨逹額邊塵天責屬土象隂寅辰星命天貴功名自譽寅辰二宫得地主財足榮華富貴呼奴婢世少凶灾所謀順遂萬倍生涯彖曰天貴寅辰最好佳毛頭拱照不繁華杖星加臨貧且賤一似宣州花木瓜彖曰天貴星名廟旺中申子辰及亥寅宫少年臨雅翡聲譽金榜標名福慶隆彖曰天貴從禄福德深若臨身命作宫人更兼文印傍偏照管取居官轉紫宸貴星入廟在身命運限逢之福禄隆億萬資財似离岳爲官品列在三公天印陽象屬土子卯辰亥星命天印照身命女子至心靈男子有名譽惡星不至早有權柄異星若來不天則病一生少吉半世多凶倘逢天杖借權仕階偏有庶予正室無胎彖曰天印元來是吉星毛頭一宿不堪親喜遊子卯二宫裡掌握兵權作師臣彖曰天印元來是吉星子卯辰巳達光榮官高權重人欽羨赫赫聲名振帝京彖曰天印臨身有勢權三方有力照身元若無虛哭并毛異富貴雙全亨百年印星入廟最爲竒禍則消除福則隨要緊命中逢吉曜少年平步上天梯天壽象陽屬土亥酉戌壽星獨立有子不孤官符平生不作㐫灾一世全無若不䧟溺福厚業餘本宫若無惡宿壽與彭祖同途位彖曰巳亥午宫行天庫積玉堆金無記數毛哭若來生賤疾稚年記了百年事彖曰天庫星臨獅子宫倘臨巳亥亦和同三方若也無凶曜積玉堆金作富翁彖曰庫貫入廟名天助智足多謀巧心路不用金銀禄有餘若不成名也須富文昌象陽屬木寅午戌星名文昌照身命宫男人必吐珠璣女子巧緌鴛央少年不學自揚名官禄須見文章顯寅午戌宫最爲竒文星貴宿足天盈少年及第冠群英天杖加臨貧且賤百歲虛爲百歲名彖曰文昌戌上同寅午此處榮華衣金紫翰苑蜚聲名垣赫文章出衆功名士彖曰文昌廟旺必聦明定有文章冠世榮失位亦逢高貴倚公私須達俐知名彖曰文昌吉曜臨身命主擢巍科邁等倫紅鸞才質十分竒美貌光亨事事宜福德若臨身命上定膺福禄兩相隨彖曰入廟紅鸞身命臨俊然容貌似觀音其人情性温良相出衆超群衆所欽貫素象隂屬土卯巳午未亥星名貫索照身命宫人有多成多敗一生半吉半凶毛頭加臨若顏子之早喪杖星同照壽如彭祖之長生巳亥二宫爲入廟晚年財禄自豐隆彖曰貫星巳亥作高强家門昌盛置田庄天杖傍照多子息草毛一子也難當彖曰貫索之星號洞玄未申巳亥正相纏滿堂金玉堆如土財禄豐盈萬頃田彖曰貫索之星號洞微命中偵此好根基若無天異毛頭照依舊平安得便宜天庫象陽屬土卯巳亥午星名天庫人多富貴女子多置田庄男子顯爵位巳亥午上更聚財臨危不驚險不畏此星之主三子成刑刃相同留一彖曰天壽限臨人命長亥酉二宫最爲良刃哭若還加臨上將來必定待侯王彖曰天壽之星號吉祥喜居酉亥壽延長若得吉曜來相照壽筭彌堅福禄昌彖曰天壽之生號老人得居身命美人倫尊崇福德人瞻仰名禄之中是富榮彖曰吉星天壽福當權廟旺逢之福自然出則將兮入則相人皆道是傳若賢紅鸞象隂屬金辰丑寅星名紅鸞人身長大男人早婚早姻婦人無尅害便喜辰丑聦明富貴若無灾星與同途白首光華八十餘紅鸞吉相爲美彖曰紅鸞吉曜喜如何凶星毛頭不可過萬一刑刃加臨上猶如霜折半池荷彖曰紅鸞一宿從來吉巳亥寅宫丑上遊享福半生多稱意貴膺帝勑位王侯彖曰運限方沖方相顯腰金衣紫輔明君天福象陽屬土申卯福星加臨此命最好女人美貌端嚴男子婚早子早惡星不臨多財多寳申卯最加无灾旡禍父母兄弟雙全夫婦百年諧老彖曰天福申卯作才郞腰横金帶好文章哭虛二星加臨上不貧則夭實堪傷彖曰天福加臨身與命爲人大度有精神更兼禄貫三方照定作榮華富貴人彖曰天福吉星來入廟最宜身命更加臨福禄興隆生貴子三方不破禄多增天禄象陽屬木巳申禄星加臨惡星不至人有智惠聦明求謀萬事稱意居在巳申身命得地吉星三子且留二毛頭若不共同行功業成兮田自置彖曰太極天禄巳得位所遇吉星皆得地毛頭星若不同宫事業功名由我致彖曰禄元星宿主科名衣錦腰金甚貴榮輔佐君王成大業金枝玉葉是皇親彖曰禄居申巳號三台福禄无求亦自來財穀一生多富積文章合會作高魁彖曰天禄加臨慶有餘爲人權柄播當途更宜福氣文昌挾豪傑英雄樂裕如天杖象陽屬木未亥子申星名天杖偏生妾男子婚姻不得子息難乳不貧則夭杖星落廟而榮貴元灾身曜入宫而清慈獲福彖曰若不披毛并帶角也作驢前馬後人獨喜官星居亥子縱然富貴主孤身彖曰天杖最宜亥子遊同與申酉并來求凡事稱心少違背更加一壽免灾憂彖曰惟容貌而且秀取人事而最足天杖之星入命中吉星救助善星逢或遇限中逢此曜爲官爲吏任從容彖曰杖居月位凶何有身到天門棧自無天杖入廟號天威掌握兵權定四夷此是權星凶變吉英聲無處不揚輝天異象隂屬土辰丑未星名天異虛星同宫兩惡相宗少年不夭除去少吉多凶父母見尅兄弟無子無踪祖業不留皆破盡一生萍跡走東西未與丑辰宫最樂吉星同照禄重上彖曰身命貫異虛當頭路途湖口也無愁若教刑宿來沖破只是厨中爨僅流彖曰天異之星太不祥喜逢丑未及辰郷辰巳無灾多喜悅經營庶事緫蕃昌彖曰離别之曜最關情天使眉頭空惱人寡婦三夫猶未足孤男五婦未成親彖曰異星入廟正臨宫多積資財谷甚豐田宅之中加旺相更觀身命吉星隆毛頭象隂屬水子卯未寅戌星名毛頭只喜樂旺若單行婦人尅夫害子男子重媾婚姻祖宅空虛生涯自立須然衣食無虧半世勤勞未免耗粹欺財不是守成之輩彖曰毛與子卯寅戌地性靜情逸更聦明男子不富則必貴女子不貴則心靈彖曰毛頭哭刃不可當徒流奔走利名場縱然祖業消磨盡子息何如得乆長彖曰毛頭子卯寅戌地福惠須輕亦有禎吉曜加臨摧族節出膺天命鎭邊城彖曰毛頭惡宿吉爲凶犯此之人一世窮若得好星來救助也教官事見重重彖曰毛頭入廟臨身命遇者應須帶武人名譽揚揚遍天下藩垣鎭便四夷賔天刃象隂屬金申巳午寅酉同單刃貫宫財禄合格女人害夫尅子男見婚姻不得煢煢孑孑立身却少灾厄父母兄弟不留妻奴豈得長久天刃自刃重叠來兩般逢此便爲灾殺曜四强同水火少年遇惡死爲灰彖曰血光犯命必傷殘刑刃加臨䄀厄佳六尺之軀亡虎咬亦然須是溺波澗彖曰刃宿同刑損父母男子必須好過房若是女子同宫照數定刃度作新娘彖曰無福傷身破相有救必傷六親天刃流血逆星凶限到還逢厄難重廟旺湏然文武貴也防輕敵却成空彖曰玉臨八殺光灼灼斤在財宫福不全若是刑星不入廟灾憂蛇腹定當年彖曰天刃居己并午申更逢寅位主光榮必因武勇成大業名顯專權統萬兵彖曰天刃凶星到白羊照曜乾坤定四方掌握威權施妙手得財顯達必爲祥天刑象隂屬火寅午酉戌刑星單行爲三不了爲僧爲道不成家却又無分曉孤哉孤哉不孤則無兄弟父母不雙全妻奴分上不長乆三宫傷身於猖亡自縊之灾彖曰霹靂命中怎不怕見刑身陷何須下命被壽促惡星臨其人死在雷霆下彖曰三不了星爲天刑爲僧爲道號孤身刃哭二星加臨上不免須臾帶疾人彖曰天姚居戌卯辰遊更向雙佳一併求福厚也須躭酒慾無災無厄度春秋彖曰天姚即咸池也咸池一殺䄀兼真逢水妖嬈主亂淫沐浴進神徒見貴心教傾國與傾城彖曰夫姚星與敗星同號曰人間掃箒㐫辛苦平生更一世不曽安逸在家中彖曰天姚入廟並爲祥運限相逢定吉昌更遇賢妻添福禄氷長得地甚高强十八星所屬哭刃彎金火是刑紫文杖禄木成林毛姚虛水貴福土印壽庫貫異土同諸星入身命二宫凡看所屬五行詳其時照三方四正和合之宫何星論其生尅制化斷其福禄吉㐫也入骨僊經四言緫齗撮要法歌曰一氣混元五行未見三才肇分隂陽始變同生異刑有吉有㐫有男有女同生異刑均此一理壽鸞庫昌福禄紫微貴印天壽紅鸞紫貴印曰庫貫文昌福禄周旋吉曜左行是曰吉星隨年左行照臨身命富貴非輕杖異毛刃姚哭刑杖異毛刃姚與哭刑皆曰㐫星是命㐫宿遇之者傾各有廟旺循環不窮紫微喜申子巳酉亥主榮紫居申子巳酉亥榮天虛喜五午未酉亥主榮辰宫丑午玉堂爲宜天貴喜寅辰亥卯未貴在寅辰亥卯堪居天印喜子卯辰卯授宜何子卯辰位吉主權貴身命逢之不求自貴凢天壽星喜亥酉天壽老人亥酉寅宫寅入廟旺三方四正沖合亨通此紅鸞喜辰丑寅卯亥紅鸞辰丑寅卯亥佳庫貴卯巳午未庫喜亥位庫貫之星位不可差此文昌喜寅午戌妙主擢科甲位居卿相所卯巳午未亥土堪誇文昌文昌之宿寅午戌佳此福禄星喜寅卯巳午申居卿相福禄登科甲第位居卿相福禄寅卯巳午甲居此杖星喜子申亥旺沖合拱照富貴無疑天杖杖在子申亥未廟旺此兩星喜子卯未敢作敢爲財雄財旺毛星毛在子卯未寅戌中此異星喜丑寅辰位寅戌多財富膽略雄大掣電英雄天異異居丑寅辰未博學天刃喜申巳午寅刃在申巳午寅著脚天姚喜卯辰戌亥入垣天姚淫娼卯辰戌亥此星喜寅酉戌入局吉名曰入垣風流之輩天刑天刑寅酉戌上無迎天哭星天哭所居丑申卯午㐫化爲吉名曰得所吉星失陷吉星失陷禍福相停多藝多財四海名傳刑刃不保終若逢失陷更會惡星天刃天刑逢刃不吉刑不保絡天刃居廟旺則吉一切惡曜不可相侵曜居廟垣方保安心天印權柄富貴大䧟印星得地權柄多福身命遇之金珠千斛亦主人苦如會惡星其福減半倘若失陷孤刑直判天壽主慈善福高天壽得地慈善福高縱會㐫星出入滔滔會哭即夭无疑如若得地又會哭星夭折分明天庫主横財喜事天庫得地名曰横財身命逢吉財自天來刑杖加異刑杖有權加異偏駁會毛加姚會毛破祖惡姚淫惡天貫豐產業貫索之星一名寳藏財利豐肥家業興隆俱失陷主爭訟破家事若還失䧟又會㐫星是非爭訟門户必傾文昌陷生非文昌得地是謂天魁詞章才學文興福齊空腔失䧟不吉會惡生非紅鸞好花酒紅鸞得地威儀濟楚好酒貪花无所不可空腔會吉則吉會凶則凶男女皆然可賤可榮天福火天福得地福厚如山會吉非凡更會吉星富貴非凡陷禍耗失陷逢惡反吉爲禍命限逢之消息難過天禄天禄得位一生榮貴姚增妾不會㐫星會長福聚異孤毛文武才逢姚增寵異遇孤立會刃疾毛主文武刃生疾病天杖刑禁杖星得地亦主權顯失䧟剛强刑禁羅網天異宜更變換祖姓異姓得地意外之吉失䧟破敗他𡖥之客毛頭主兵權陷暴横毛頭得地天地未判失䧟横暴天理必然天刃陷哭禍刑誅刃星得地轉禍爲祥失䧟灾非羊刃血光天姚風流䧟淫辱姚星得地風流富貴失䧟淫辱内亂多婢天刑陷刑罹家口巳禍天刑得地亦不爲灾失陷刑罹家口難諧天哭䧟刑孝巳不足天哭得地當哭不哭失䧟刑孝自身不足十八星轉在人變通不可執一依身會斷運限同推流年並看運限定論自小限對沖起之一宫安一曜陽男隂女順行隂男陽女逆行本生本命宫起小限用布紫微鸞文貴虛印壽福禄庫貫起外躔諸星并月大小哭星倒流年太歳前一宫逆紫虛前同杖異寅申毛巳刃亥俱從午逆逢刑酉姚丑亦逆順太歲合者小哭位申前一宫爲輔甫身後一宫三日住身命俱有兩没宫三命兩没未宫逢正鷄二蛇三馬四羊五虎六免七龍八猪九犬十羊十一猴十二鼠禍福詳推仔細求凢人三日有吉星主出入遇貴人引進獲財須在遷移宫方最妙紫微斗數卷之一終紫微斗數驅二太乙金井局隂陽玄妙論夫人者禀天地之氣受隂陽之精生其身命上屬五星下屬五行若其時正則身命高超前程顯達其時不正命賤身卑沉淪飄没大抵人生須星辰得地運用並勝可遂更喜樂旺無刑而吉星在高强宫皆爲福厚之人也此乃前定星辰之所主也凡看命先定身宫並身者上係太乙之神若好星與禄旺相見得地頗成天氣則是清貴之命然後却推命宫及時候淺深不安則無力縱有力星辰爲福六輕須得地時正方得榮顯福德田宅官禄六宫好惡斷其存亡貴賤定其禍福方有應驗凡諸星在廟堂之宫樂旺之所又拘隂陽宫分論之經云陽星好善隂星好殺凡在星命二宫時刻分派遇陽多而隂少產初一二三四刻時分者則福厚而壽長雙親有慶鴈字聯行妻賢子秀更在廟旺之宫安身命者上等之命男子生而陽星爲貴產於上四刻者主剛强福女子生而遇隂星爲榮出於下四刻至八刻者主婦道攸宜外親有力妯娌和諧夫妻舉案齊眉子嗣雙雙俊彥也必筭其時然後準其禍福定其骨肉有無刑剋辨其富貴賢愚陽星主文在其廟旺之𡖥占六陽之宫則文藻清華之士隂星主武在樂旺之宫又占六隂之域則就武勇毅之人凡諸星在陽居陽在隂居隂各從其類是爲得地也相反者隂陽錯雜是謂不得地受氣濁者矣一日之間自卯至申六時爲陽爲晝自酉至寅六時爲隂爲夜凡人生寓隂宫可忌晝生生寓陽宫可忌夜生二位一時又憎晝夜相半時有上下不同皆須減福減筭倘若隂陽混襍刻數不均對合爲凶此又非廟旺則必福薄命短之人也更看行限所遇善星惡星入於身命時刻端確禍福無不驗耳骨肉三局賦古者玄理名爲紫微獨攄一家之妙遂爲三局之竒究星辰善惡之源熟求閫奥定宫外尊卑之位細察存亡夫太極肇分三才巳備貧而夭者曷知其本富而者曷知其義命有興衰情有粹駁災祥交至蓋窮上古之文福禄並照共在紫微之位所有諸星條款時辰刻數閙時于後卯㬍屬陽紫木文木福土禄木印土壽土杖木庫土姚水貴土紅金異土毛水虛水貴土刑火刃金哭金辰峕陽文福祥印壽杖庫姚紫紅異毛虛貫刑刃哭貴巳峕陽文福禄印壽杖庫姚紫異毛虛貫刑刃哭貴紅午峕陽禄印壽杖庫姚紫文福毛虛貫刑刃哭貴紅異未峕陽印壽杖庫紅紫文福禄虛貫刑刃哭貴紅異毛申峕陽壽杖庫姚紫文福禄印貫刑刃哭貴紅異毛虛酉音屬隂杖庫姚紫文得禄印壽刑刃哭貴紅異毛虛貫峕隂庫姚紫文福禄印壽杖刃哭貴紅異毛虛貫刑亥峕阴姚紫文福禄印壽杖庫哭貴紅異毛虛貫刑刃子峕阴紫文禄印壽杖庫姚貴纖異毛虛貫刑刃哭丑峕隂文福禄印壽杖庫姚紫紅異毛虛貫刑刃哭貴寅峕隂福禄印壽杖庫姚紫文異毛虛貫刑刃哭貴紅分貧雷貴貧綫文昌主貴天虛主貧天姚主賤天福主富天刃主刑天禄主禄天貴主禄天哭主刑毛頭主耗天杖刑父天壽主壽天刑主刑上局貴命身命三日後輔四宫皆吉老人星合對主父母高年位及人臣身命二宫逢儀鳳吉祥帝符老人合對主母有壽及人臣台輔照命鸞微印壽諸星但遇本日生時合刻者又遇善星入廟三分善星一分廟旺上局上貴之命也十二時中分爲百刻精研星象纏度後可究其吉㐫方有應驗耳隂升陽降㐫星對杖者損父吉星相尚者皆壽酉屬隂紫文福禄印壽杖庫姚貴紅異毛虛貫刑刃哭戌隂文福禄印壽杖庫姚紫紅異毛虛貫刑刃哭貴亥隂福禄印壽杖庫紅紫文異毛虛貫刑刃哭貴紅子隂禄印壽杖庫姚紫文福毛虛貫刑刃哭貴紅異丑隂印壽杖庫姚紫文福禄虛貫刑刃哭貴寅隂壽杖庫姚紫文福禄印貫刑刃哭貴紅異毛虛卯陽杖庫姚紫文福禄印壽刑刃哭貴紅異毛虛貫辰陽庫姚紫文福禄印壽杖刃哭貴紅異毛虛貫刑巳陽姚紫文福禄印壽杖庫哭貴紅異毛虛貫刑刃午陽紫文福禄印壽杖庫姚貴紅異毛虛貫刑刃哭未陽文福禄印壽杖庫姚紫紅異毛虛貫刑刃哭貴申陽福禄印壽杖庫姚紫文異毛虛貫刑刃刑貴紅中局貴命善星高惡星低身命吉曜文昌拱照輔印星四方或三合福曜正守廟旺之宫輔印正時分八刻星分九曜又在高强之位福星廟旺對合宫獨輔星高身命但得一星廟旺照高强之位或在三日宫八刻内占其六隂之域身鸞星不對天杖母受長年兼廟旺中局中貴殷富之命也下局貴命台輔星獨高身命及三日宫俱得善星三合又得善星下局上貴之命也福星樂旺高强善星陷弱下貴之命此乃隂陽相伴時刻得中不入局常人之命善惡星相伴照命宫台輔不得位富人命台輔陷弱横財正照虛廟不照破紅鸞對合此爲巨富之人也貧賤之命福星陷天姚照守身命二宫虛星對照此至貧至賤之命父母早年見剋兄弟縱有若無刑妻損子或遇吉限善星財亦不積聚蓋爲根基淺薄須有文學官禄不爲入局之命也愚人之命文昌不可陷弱宫六是吉星高强宫是凶星又不入廟其凶乎大抵星辰入局不看官禄其修學者須看文昌而常人但看天禄天杖壽便可以决定其有無厚薄也定諸宫分合觀夫福壽齊臨紅鸞何如其聦明虛異同拱毛頭何如其昏昩或在天印則主遷移之位有權或在文昌則無福禄之行或在田宅則穀粟盈倉或在財帛則金玉滿籯貴禄臨男女之宫光榮後代庫貫臨身命之宫前程永固緫有榮華姚異纏身斷無壽考刃哭臨命天虛天刃兮皆主其禍天刑天杖兮孰爲其慶遇妻妾則孤寡多吉入官禄則穹多病運逢此曜即是凶危之臨限過其星必有灾殃之咎是知命有窮達有長短達士則居高强之位窮人則守寂寞之𡖥榮華壽考乃吉曜之相臨横逆夭亡實凶星之並照非星辰無以考其詳非運何以知其要銳意精思推則斯文之奥談今博古方識此書之良生死貧富若非前定貴賤榮枯乃知不偶推算之術有精有微考于經典則三復而可曉觀此妙術非一日之所能則四主三元之說眞金不換五星六曜之論美玉難當十八星黙察其理十二官盡得其要貧賤富貴實難逃䄀福星辰無不照夫人受天地之氣之爲三才天地人全者謂之成人則運限值之則財高永天地人不全者謂之不成人則運限臨之則財傾逝凡虛哭刑刃不照者爲全照破者爲之不全限入陽宫遇陽星者隂宫遇隂星者各秉天時受中和之氣也避忌之年遇哭星立見應也凡人當生紫紅貴星在身命宫初限榮貴發禄變大若文昌諸星對照及在廟旺宫亦有吉慶喜事天虛入限主財帛耗散凡照處皆不吉并見乖異之事天印入運限更在高强宫入廟則有重權之喜雖不入局主有吉慶之事限遇紅鸞主聘美色婦人女配俊傑之夫虛星照限命者主虛驚之事姚刃主水厄毛異主火灾邊配徒流變姓異祻限命如值庫貫主有横財貧則暴富其餘㐫星隨文昌星之椎詳察星辰得官分爲準不失毫釐或有限初交而死者或臨限而亡者須憑生死星辰詳斷若限内天哭星正照身命曰黄泉星若正照限與於對照者名曰浪濤限主亡死孝眼重重陽宫多悲隂宫多喜若廟照處乃爲福星亦不免外喪乃親孝服也夫浪濤限一說乃杖貫哭此三星是也斷曰得失窮通未易窮由來盡屬身命宫吉星臨此皆膺福惡曜加臨圭惡絡彖曰姚異雙星俱照命此是㐫神必易殃破祖離鄉貪酒色男爲淫客女爲娼彖曰天哭㐫星朂不祥若臨大限見危亡休言祖業消磨盡更怕光隂不久長彖曰虛刃之星身命臨只宜林下可安身俗人犯者行千里重重管取見灾迍彖曰疾病之中惡曜加五臟失調不可誇脚䏢腰駝并曲背縱然壽永福無佳彖曰四正宫中最要强善星臨照喜非常哭刃二星當頭立骨肉刑傷祻未央田宅見之惟破祖妻妾見之必損傷官禄遇時無事至命宫逢者必乖張始絡禍福皆前定從頭歷過細推詳彖曰天哭之星最不祥若然見者必爲殃縱然祖業消磨盡急急光隂不乆長彖曰凶星主哭最爲灾宫事重重入户來歲限若然逢此殺門庭主見哭哀哀彖曰刑哭相逢事不輕行年若遇主虛驚福禄旺時防產厄人離財散不安寧彖曰天刃之星是七傷併沖歲限定傷亡若非是托隂功力定招灾禍及重喪洞微十八星斷紫微星一名紫氣太陽玉堂少微近待貴人晋志云此星居帝垣之中至尊至貴吉能制此星照臨慧慈主長命富貴論格局獨立玄上天門謂之拱北辰主貴獨臨卯位謂之出辰格主貴大命照身又會吉星入侍謂之清光格廟樂旺官己酉廟是入廟格申亥樂子旺是交宫格身命值之主好道多才識衣紫腰金爲人尊尚小人難近其慈善學道則有神仙之分照身宫主有禄清職端正能文多智居是官主一生慈善而有福禄不入廟旺爲孤神好僧道守齋戒同例刃則爲山林泉石之士會暗曜主好色性剛無親婦人妨夫損子如會吉神却夫榮子貴有封號若失地則衰弱臨危亦有救爲九流之人諸宫分官禄宫見之主爵位高崇好善種德不損助守常禮義運限見之主面見人君此星守命主人物古貌豐肥身瘦長腰背穹窿氣色昏沈紫彤色或黄白色小兒清瘦清黄色彖曰子禮貌爲人賔尊賢惡不仁文經武緯事清貴作朝臣彖曰丑丑位謙而孤姻親有若無仁義有設施康莊是坦途彖曰寅寅位號真人僉途不相親志曾居相外身亦有親君彖曰卯卯位號樞和皆因迭化孤先難而後易晚景是豐途彖曰辰辰上是天空名成時又豐姻親非我分雙拳獨奮功彖曰巳巳上恩承世名成重大都日近清光下殊勳豈能無彖曰午天恩入孤虛風波險相遇有源無旱涸奮力上天衢彖曰未紫乃入天淵性善别愚賢卓意半途苦晚景是光亨彖曰申秉性特温良心高志見長文經武緯事掌握鎭邊疆彖曰酉酉上紫微星威儀近至尊名在主人上聲價對乾坤彖曰戌天喜到白羊月桂噴秋香成敗多經歷晚景定爲良彖曰亥亥紫到天門孑身浮若雲憂不憂巳事識高必近君天虛星又名無實空亡孝服黄泉黑道天𦂯在垣中爲破耗之星凡照處遇吉不吉遇凶主貪主狂妄又主孝服廟中旺丑身命宫主性巧福薄虛誑照是宫主憂疑財帛耗散與惡星同亦壽夭若在廟旺有善星吉如得地官品員外郞失地狂妄之人主夭會吉星同宫亦主虛名虛利會曜杖刃主法死加刑主横死加刃主夭加杖主貪酷加毛破耗加姚淫奔加哭主孤加異主好謀詭若在身宫主一身兩姓早年剋父女人見之不宜官禄宫主有虛名相貌宫却災奴僕宫智不如奴運限逢之尤多事會刑殺併限到則爲三坵五墓一生好事皆空萬事到頭如夢身星臨虛刑刃者損母早彖曰悟徹三千與大千平生不爲利名牽子子位號天空謀爲若夢中家基須自立生計是飄蓬彖曰丑丑位斗牛宫豈孤道不窮精明分黑白身在仕途中彖曰寅虛星若在寅聦明道非身欲要光宗祖顱身不顧人彖曰卯天蝎居近泉安居非自然歷練窮冬盡精神愈更堅彖曰辰倉庫入天虛半生分明孤須然不缺禄未免役征途彖曰巳太乙名虛耗迂迴非我傲奔走半生身中年方運到彖曰午虛宿豈奔離忠言達聖機風波接中首晚景任施爲彖曰未玉堂坐天孤係練豈能無姻親非我有基謀自當圖彖曰申天虛號孤宿求道衣禄豐與異倘相伴一身兩姓當彖曰酉虛遇莫憚勞巨萬也磨消自立方成器晩年方見高彖曰戌吉曜若並行祖業也須更此身名利事生涯兩處營彖曰亥亥上成孤子成敗多歇滅祖業有若無只好自施設天貴星又名天乙始泰君棋陏志云此星紫微星宫門乃太乙之神也主戰鬥知人吉㐫持威福之權以制善惡之星主貴文章愽學也廟樂旺宫辰廟寅樂亥旺身命宫主立非常之功超群出衆難事易成高人見親小人難近有聲名是宫主智高上文章滿腹好道尊榮有科名顯達之職又曰少因異夢而生得地廟旺有權三方拱會一世榮華有殺見之皆退須遇厄難亦傍貴人會惡曜毛頭印杖有權會姚淫會哭如巫依如刃惡與刑同宫巧計千般加㐫星刑刃不善終父母損親無力婦人見之有吉星則貴有封號金冠紫綬之印會惡星不仁不義妨夫害子醜惡之人官禄宫主出衆不怕事無惡意歳限逢之有喜慶也天貴守命主形端面白方員氣宇寬大物長大肥胖面方員白凈四字唇紅齒白心和性良清雅便爲官加吉星者至親有倚手足情長彖曰子子上好文星心絜性尤清功名不勞力聲譽播朝廷彖曰丑天輔至斗牛清名達四周不須承祖業功利自能儔彖曰寅寅宫旺貴星基業壯精神雖不登蟾閣聲名也動人彖曰卯殿閣居卯宫性聦全義類初限未能成須待晩年貴彖曰辰天貴旺金宫神清性亦聦非特一身貴世代位豐隆彖曰巳巳貴紫微宫榮華有始終一身登要地兒孫學業通彖曰午午貴當坎離姻親實險違中元光祖業聲名更遠馳彖曰未科甲入未宫欲遯豈能容離坎無荆棘高人有薦功彖曰申天貴守隂陽立志有維綱初年未發達晩歲見名揚彖曰酉貴騎金牛上清竒古怪人何愁衣禄淺聲譽播朝廷彖曰戌戌上號天醫聲名必自宜立身思遇貴漸顯莫清疑彖曰亥天門爲旺氣非來禄非細定作異人者仁慈眞大貴天印星又名帝符此星主統兵鎭軍之象殺伐之權廟子旺辰樂卯身命宫主權貴福多居是宫主威名權重若是有天杖主掌印會善星主有神仙之分不然位極人臣會惡星喜職加異偏生庶出不然早剋雙親加杖毛有權加刑慘酷加姚淫穢加刃孤天加哭孤獨得地則承祖業失地無承運限逢之却有驟遷女人見之貌利性良主限官禄宫人敬服妻妾宫主妻致富運限照臨主遷官顯達之職歲限逢之則有聲名人物清秀聦明中等身材面清白彖曰子子廟定威權慈祥氣象寬行藏絡有分異日遇居看彖曰丑印星臨斗宿名利恐初難中年須遠慮至死不能榮彖曰寅人馬印居垣逢之氣象寬根基須靠祖自有好機關彖曰卯卯臨來卯宫情性善温良生涯莫依祖自立始輝光彖曰辰印落在辰宫雖危不至㐫根基惟獨立臨老旺門風彖曰巳絶𡖥是此星家計始孤貧不得婚親力末年方遇春彖曰午印宿午偏兮挺挺多是非行藏須有泰求事奈遲遲彖曰未印元宜遷移如非局在棋機成還有敗晩景始方宜彖曰申經緯到隂陽中年定自强須己利名有臨老始芬芳彖曰酉印入金牛宫得失兩悠悠知命能謹守窮道始可謀彖曰戌天印入白羊心地方恢張榮身須自立莫把作尋常彖曰亥亥位見天祥精明道義揚破却月中桂朝中一棟梁天壽星又名老人尚父此星居南爲老人星守垣局中主長生廟亥旺酉樂寅身命宫高福廷壽好善有隂德晚年得福居是宫主因壽得福𢉱旺尤貴若居酉上自少無灾加杖有權加毛破祖加刑主刑宫陷宫早亡守虛異哭主星合照主不出三日而死壽星見哭虛謂之陷弱終無永女人見之主有福虛異刃哭四星者主夭折亦主骨肉損刑過房入贅官禄宫見事長慮慈憫運限無凶星干絆主福貴雙榮人物長大身貌從容性格執古作事無私且守且耐彖曰子壽入寳瓶宫青春樂有餘中年多反覆好景在桑榆彖曰丑斗牛得星温良性亦門冷淡宜初主終年始有榮彖曰寅壽星在樂寅功就即非親縱横妙用處絡須達貴倫彖曰卯仰位無虧凶星不怕危縱他風浪險謀望有關機彖曰辰天墀化紫衣僧道豈孤恓受償值榮禄高貴引丹墀彖曰巳不喜蛇宫更張事不通若因金水地晚景始成功彖曰午麗雅號孤聆名高却低若問功名就看看髮白時彖曰未入未加𡖥名利慢更張還須歷練到晚歲始名香彖曰申老人見坤宫難成事業功花開復花謝根在晚年豐彖曰酉壽入酉宫兮終可達天衢功名須獨立加官不必宜彖曰戌白羊星安身命必加官有名還有利何慮事多難彖曰亥朝元廟旺宫英俊性從容文章冠天下中年職位隆紅鸞星又名太隂天鷖儀鳳和鳴此星喜則紅鸞怒則計都在垣局近侍之宿主有官禄論格局臨亥上爲月照天門格主貴紅鸞入廟禄元照身命爲龍門高擢格主貴廟樂旺宫丑廟見入廟格照身命宫主性柔威儀清楚好衣服貪酒色喜朋友多得隂人扶助又招妻財居是宫主性柔容貌温恭美色秀麗舉動有成好粹餙會惡曜加杖有性狼有權加毛淫慾加刃狼籍人加異者棄祖女不良爲娼加姚爲妬婦非妬爲厄爲婢妾男加刑險處成名但早年失恃怙骨肉刑若諸星得地則出類才能爲國家鎭撫天下學問過人能處事業失地者則入空門亦主辛苦加姚毛主酒色陷地則無成就女人美麗性躁隂毒有封號廟旺樂宫爲人曉事識高低善處閨門性快會吉星則貴會凶曜不良入廟主應異夢而生官禄宫主好禮樂仁義不妄作有權柄兄弟宫見之鴈字成行運限流年見之非常有慶主人物俊秀性格聦明洒洛和氣風流花酒賭博三者必占一也彖曰紅鸞守命面方平眉目分明俊秀郎四字唇紅并齒白一生温潤有柔剛彖曰女人最喜太隂星智識機謀性地明喜怒不常難受觸能招貴子及夫榮彖曰子儀鳳爲科名持權定有聲平生無險懼禹浪跳三層彖曰丑人丑貴無倫富貴皆有因莫憂前途險平步侍明君彖曰寅寅上好威儀天然性地馳友朋好酒色風流儒雅施彖曰卯卯上喜紅鸞心明膽志昌文章非若祖貴至位嚴廓彖曰辰辰到金棋局昂然大丈夫靜時非是靜閑宻喜無拘彖曰巳巳位號天盈孤圭月主明但看存恩節桑榆到始榮彖曰午紅鸞號午位女人常如意男子且循常中年榮且貴彖曰未鸞入巨蟹𡖥孤身雙女當門庭兩相隔至老倍風光彖曰申鸞不入申𡖥聲名未顯揚妨妻并尅子姻眷早參商彖曰酉酉宫見紅鸞美事未能全家道成又破好事始團圓彖曰戌鸞入白羊家貪酒又貪花雖然中運福晚景更堪誇彖曰亥亥上稱人意攀高羽士林性情無偏比晚景又駸駸天庫星又名天財吉星書云右弼之異名北斗之杓柄又名天庫之祥在婁之左角爲兵庫之府居紫微中爲玉府之神庫藏之曜珍寳兵償皆賴之廟午旺亥己樂卯未身命宫主富貴財帛田宅豐滿如身命值之貴可參大政是宫主財却損人益己會吉曜杖印主貴少權印主富貴喜天刑發財加刑杖有權加毛破祖會孤星不聚可謂大德閑人加異者庶出改祖或入贅竒怪之人加哭刑害父母兄弟便是楚秦加姚淫慾加刃者惡死有疾壓之方有不然溺水波沈女人見之端正福厚善處閨儀加姚主淫私官禄宫主才能計智運限照之主有財貧則暴富人物肥厚女人犯毛異者主產厄男女主肺經喘滿因財致祻餘皆倣此彖曰雖然天庫號孤神吉曜相逢時有名最喜逢危中有救一生閑樂作閑人彖曰子天庫對寳瓶徘徊又虛驚貌變當自立營謀必有成彖曰丑庫入丑孤暌須防子與妻中道自然泰晚年又得時彖曰寅天庫號財星孤害不可聽基業元非善求營始得榮彖曰卯影孤心又虛横財富有餘基謀當自置終歸潭府居彖曰辰天庫好居辰雖榮未顯倫萍梗奔馳地晚年方福殷彖曰巳庫入巳宫强根基必長仁慈無謟曲姓字自然昶彖曰午天庫到離宫形貌正温恭仁厚無私曲榮華福位豐彖曰未未上臨身命仁厚冠群倫中年方有力老去必朝君彖曰申申宫天瑩星羈縻未得亨奔馳滿天下歸來方老成彖曰酉庫星居酉地沈晦豈無成顯處非爲祖成時自立明彖曰戌天庫人白羊家業必更張慈善無貪酷由來譽儘揚彖曰亥庫星臨亥位自立顯家風名在衆人上何愁不立功紫微斗數卷之二紫微斗數驅三貫索星名曰寳藏連索之神曰横財勾絞長繩天赦天赦天羅計都此星八名在北斗前主法津禁强暴門開則成獄訟主恩赦主發驟喜論格局勾絞星主索刑同守身命官爲連索身刑格招閑事惹爭訟廟未旺己樂亥卯午身命宫主財帛豐厚照身命運限流年遇主財帛充足利名索絆不能心閑凡宫主與天庫同會吉曜相遇禍厚恩赦横禍水釋會鸞刑主發財會凶曜多獄訟加刃惡死姚淫蕩加哭杖主天折加惡星必主吊刑懸溺雷擊獸傷身屍流蕩傷肢毁體碌碌浮生無超達鄙吝之人入官禄宫與天庫同運限流年拱會主驟發會惡星主離别爭訟女人遇此同之尤防産死因色陷身處家善能彖曰雖然天庫號孤神吉曜相逢時有名最喜逢危中有救一生幽雅作閑人子子土多成敗黑道主哀怨悲傷毒夫惟計錙銖之入收積有餘五自立有成主孤尅悽惶損六親雞口惟貪不念若儻來之物一漚主暴卒惡毒呪咀不仁少親力見利而忘奮約悖德而負初心卯卯上有財人主腰陀手足風疾没温良無禮義有禽獸亂瀆之行無水木本厚之思辰先破後成主喪吊臨門之事雷虎之驚看仔細仔細相交小心方可强壯不征自慶晚籠之鳥巳險處成立印星之權印禄之象太乙宫喜貫虎來廊廟得安居君寵臣安權有節名揚當列中午實星旺午財禄無虧妻子骨肉成虛惡會得朱吉照多阻蠅頭是務豈知有悖出之虞未孤散入集主有刑禁之事孤尅六親無底㐫星則吉心迷法綱身逐利途申與殺相宫有隂害謀毒害不爲無福孤尅孽自己作空污良善酉上能自立土宫貫臨妻妾異心有母必尅喪吊臨此吉凶既異其制而悲戌上多辛苦天正星近貴有衣禄遇惡㐫自縊迹須異於穿窬情何殊於劫奪亥清後主貴乃游治孤虛之福雙魚之地身命併臨金馬玉堂之事文昌星名曰台輔科甲第秀氣天魁三台鳳閣天竒文曲南斗六司之星主貴主學主天禄之事論格局文曲廟旺曰桂魁高攀格旺樂午戌居身命主後秀文高杖名選出將入相廟旺尤貴照各宫者主有辭章能曜科甲在廟旺才智過人有經緯之文將相之職是處事典雅會善星主大貴主科名文美會惡曜天異壯年不遂改祖庶出加仗刑剛傲加刃隂毒刑害父母兄弟不睦有若無加毛頭見破祖加刑酷毒狼狼㐫禍殘身加哭者尅害加姚異者淫奔會曜亦號孤神居旺地主清貴無雙仁義有守信實不移失地則傲慢清高隱逸孤閑而巳女人見之主淫慾加毛姚異鄙陋之人加刑刃慘酷官禄宫見之好禮義享清福不理閑事奴僕宫見之智不如奴子息宫見之逢天貴主後嗣顯達運限流年照並吉彖曰子孤立子孤遲妻兒定緩期若教妻早到長命也分離彖曰丑且惟主英名不貴亦必富中年之後來大器方成就彖曰寅寅上坐文昌英容誰可當更加吉星會發福自成章彖曰卯卯上學堂星虛危未顯名成才渾如夢老來方有情彖曰辰辰上情豪强孤高譽顯揚四正若相照貪酷必非常彖曰巳儒雅好文星身孤性格清若入高人手姻親水上萍彖曰午午位到天台逢人必主財姓名香似桂金印耀三槐彖曰未未上號孤獨雖高心上逸異枝還結子僧道亦清吉彖曰申申上號孤星心明必顯榮修文能致富老去亦須昌彖曰酉酉守命心慈扶揚善吉星不然僧與道身掛紫衣榮彖曰戌白羊偏得局聲譽遠流傳入相三名位出將想兵權彖曰亥文宿在高强須凶也不妨可憐骨格重基業晩年香天福星名善祥帝符賜福吉神此星房西三宿星星列南北二斗天福主乘輿公車之政祭祀之事尚書侍中此星也主高明福厚廟卯旺寅申樂己身命宫主壽高福最少疾作事多成九百稱心有隂力扶助在高强宫主晩年獲慶遂心稱意居能七能樂施濟人利物須與惡星同宫遇險難不危會毛異主過房庶出不然墳房入贅兩姓同居加姚有福多淫加毛流蕩加刃者主疾酷毒之人加刑股露之毒好爭訟加杖多責杖加哭孤尅雷擊浮波因財落陷惡獸殘身蓋失地無力女人見福吉加姚異毛刃則卑賤不廉之人因色産懸吊之禍不可不謹官禄宫有政事不狂妄遷移宫主出人遂心運限流年值之吉兆主享通也彖曰子福入寳瓶居生涯可待時險中還有險名利可憐虛彖曰丑丑位福星臨幼年常主災家門須自立經史盡安排彖曰寅天福入寅宫杖刃加臨貴幼年志未伸晚節必稱遂彖曰卯福又卯偏宜行藏任便爲何愁官不顯老至自應竒彖曰辰居辰爲雨澤只怕惡星臨有名無貪酷終存道義心彖曰巳福入金瑩垣聦眀性氣寬心慈能愛物年少鎭朝端彖曰午老樹晚始榮初入未揚名旺印俱臨位何愁不稱情彖曰未福星來未上超趨何日間若無惡星臨白頭方壯旺彖曰申天福入旺生何愁禄不成利名非異得權高見水清彖曰酉酉上福星加渾如澗底花刑異若來助磨粉是生涯彖曰戌白羊宫最優家富足田牛營生大業事進壽入公侯彖曰亥亥上福星燎空榮平不遭成家中有分好事未爲高天禄星曰三台佐輔天厨天財天庫天寳之星其星東北列六星曰禄元主盛鐉之事在垣局爲福爲之本養命之源主官禄吉祥論格當刑沖破禄元日連索破禄格旺巳廟申樂卯申命二宫主仁義調度居是宫主官禄自至財帛實足拱會一生宫貴命中不會凶星主大貴若遇惡星照則爲碌碌之人會善星與文星合主清雅之職加毛文武之才但財帛耗散加虛虛名虛利加異孤立加刃殺代加姚好色性快至毒入廟招寵妾加刑減福性直招怨半失雙手足情䟽妻兒見尅女人見之夫榮子貴富足優游加毛異重媾加姚淫加杖刃夭折加哭吊弔懸自縊產厄加福紫鸞福厚有封贈男女官禄宫見之最吉主財厚業隆運限流年照臨主不次之吉彖曰天禄臨身福不難高堂大厦享安閑忽然暗曜來沖破碌碌區區度歲寒彖曰子爲性善加儒雅堪誇湏無大富晚必榮華彖曰丑禄到金牛名利懶去他年之後辛苦管謀彖曰寅禄居人馬英雄俊雅福位滔滔晚年聲價彖曰卯爲人堪美名榮華富貴清自然多會遇何愁不稱情彖曰辰福來庫辰𡖥成就幾更長姻親非我分男子自當强彖曰巳巳位定威儀榮華在後期平生無阻滯下釣生魚磯彖曰午禄不出南離求名且待時晚年活計就多是好根基彖曰未禄元來未上虛譽却高遷自來知音遇時時望眼穿彖曰申申位禄堅牢榮華更富高中年成業計禱者壽清高彖曰酉禄䧟禄傾兮趨未可期若會吉星照湏有稱心時彖曰戌禄入白羊地心高身孤兮髪班方稱意聊且慰桑榆彖曰亥禄元居亥位情性最恬然姻眷如萍草雍雍喜晚年天杖星名曰獄訟某治之星玄參捧星主羅網刑禁之事論格局天杖獨守官禄宫名官郷引杖格主頻遭責辱惹禍招非廟子申亥旺未身命二宫主多遭羅網刑禁如有善星救可解罹戮與惡曜同官主杖捧惡死不然亂傷虎咬雷擊波沉鬥狼傷命居是宫加刃惡死爲人狂横不伏主氣剛强暴廟旺於貴亦主酷刑不得位會凶星爲血殺害主嗔怒不常多杖責會星天印同宫主權印亦貴顯加紫福貴壽主文慈權柄福星稱高加庫得地發財有權加貴人入廟有福壽加鸞儒雅有性加文主孤會惡曜加刑刑害父母刑不全手足參商妻嗣有尅六親少力結契無情男女亦然加姚淫慾加虛好詐加哭性參會刃主法死女人見之性剛直處事能爲會吉曜則㐫加毛異主婚重再嫁男子直之變祖離鄉自立會刑不吉主教唆詞訟招是非運限流年值之得地而有權失地主獄訟其驗如神彖曰子子爲天威禀性高巍若無凶照平步天墀彖曰丑丑爲天轟聲名遠揚守其謹愿僧道也强彖曰寅杖入寅官心性聦明遇吉則吉勞而成巧彖曰卯卯位爲人沖加印大亨通縱横妙用處辛苦始成功彖曰辰居辰杖必凶勞力自成功驛路榮身命功名事必通彖曰巳巳位不堪誇雖高身未華幾與成多敗生涯亂似麻彖曰午天彪入午索絆辛苦基業更張老耒可補彖曰未太充入未宫風騷性識通初年須狼籍晚歲始豐隆彖曰申申上有過星印壽禄方亨心平盈阻碍廟廊看雍容彖曰酉酉上爲殃會吉方强是非成敗萍他𡖥彖曰戌戌上號愴惶逢之定擾攘有成還有破老至始更張彖曰亥供星入亥宫氣象儘從容縱横妙用處知名獲大功天異星名曰離異破基司怪天孤異胎地劫鐵鉞司怪之星主天地日月星辰之變異及鳥獸草木之妖誕居南圯之人多學竒怪之事得失不常廟丑未樂辰身命二宫主破祖離𡖥重發照是宫主别離變姓與善星同宫或在廟旺則吉若與惡星同宫又在陷弱宫主多虛詐不識人少尊重但在廟旺則吉主庶出之數會惡星主大突會吉曜有意外之喜入廟樂主貴顯若正照臨主亦得妻財會吉宿主貴加緊名揚天下加貴得地聲名烜赫多淫邪加丈昌有聲譽主壯年失意加鸞風流加福禄有享用印壽有權福詭詐加庫貫驟發奔馳會惡曜加虛奸詭詐計及無廉耻加姚淫濫九刑者慘酷刑害雙親兄弟似寃家夫妻見離尅子如沙裏陶金男女亦然女人見之主淫奔官禄宫主有異財臨事多變妻妾宫不宜見之主離損害三宫有若無疾厄與姚同守主有異疾田宅宫主破祖業財帛宫耗散運限流年見之主驚怪異福耗財彖曰杖異加臨照命宫改名換姓喜相同若非異養偏房子父母還須見兩重彖曰天異加居廟旺方經營之事盡榮昌求謀立事皆如願定須創造改門墻彖曰子棄祖號玉池星性巧妙聦眀得西北之禄惡惡星相遇災疾天壽僧道遇之吉主變祖丑出外貴人欽羨文學有名惡星沖照主災疾尅害男不肖女不良寅主歌樂妙舞之事惡星沖照其辛苦之人遇吉平安卯偏生性狡猾不成遇哭刑并六親骨肉伶仃貧賤之人辰異招貪財谷招是非三方無凶星照破名揚翰苑之人破祖離宗巳主俊傑文章巧妙玉女最爲良刑臨男女主官禄顯女子有冠常遇庫貫紫富遇吉昌午此宫非爲貴男子主聦明忌天姚多破成少孤灾壽夭吉曜也平平未主人遭壓巧計美顔破湯祖業吉照得業般遇壽股肱之尅父母貧有福申福禄雙全入紫微星榮華有孫子得妻財旺盛家計足温和酉隨女情逐高主離祖男重女嫁因花破敗也戌尅害刑惡夭壽刑獄不免孤尅六親其本身主亦平平也亥福禄照宗摳機鎭府庭宫福德方揚名遇庫貫鸞紫富貴毛頭星又名天彗攙搶掃箒妖孽之星守宫主兩年灾歲饉凡照處皆不吉亦主横禍死亡廟子卯旺未戌樂寅身命宫主性强暴刃逆好殺敢勇有力凡照是宫不吉逢之其家無四璧會吉曜有權與惡星同宫則㐫居是宫須破祖爲事却快廟旺主兵權定揚旌旄節鉞會吉星加貴入廟主官禄榮顯加福德破祖成家加印壽主榮主壽加文昌清孤加庫富寔財足會惡曜加刑刃主刑父母兄弟妻子見損亦主旺年夭折加刑好殺加虛貧寒多災加哭巫醫九流之輩主外死加虛哭主瘟疫三星虛星惡星在命宫加毛㐫夭亦主貪淫好色遇貫自成立長在外若僧道身死外境官禄宫主不怕事立志有謀决斷無疑遷福二宫不遇險難運限流年照無吉星亦主官灾水厄異禍相凌女人見之亦然主有産厄肺經虛怯之症會吉星助失獲福犯主淫致禍加哭刃者六親冷落歌曰子廟有心膽能主持夜生吉星㐫妻多婢妾遇天福紫微富貴丑有福德轉禍如祥遇變禄功名富貴憑筆舌上成來廟旺上爲吉寅有權倉箱盈滿内實外虛遇吉多財藝能之人福倍富貴卯職重權支翰苑之人遇吉星富貴加惡星沖破者貧窮辰棄祖主尅害招異無刑惡百事無成遇㐫星遭刑貧賤巳更變不常孤苦無定伶仃思宜進退六親俱不得力午會吉星得貴提携加惡星多敗少成其所作爲亦不湏未有多主六親無分離祖方成遇天福貫庫主富惡星沖不利申主妖媚藝毒遇㐫星一生貧苦破祖離𡖥遇吉星主禄壽酉主破祖勞心遇㐫星夭壽不得善絡遇吉星方可免吉戌破祖有㐫化吉晩年財多遇吉曜平步雲梯遇惡星不吉亥主疑惑驚恐之遇凶星成敗不常得失無定遇善星則吉天刃星名曰流血懸針石室秘文曰此星廼金神七殺之神異名在垣局具隂德之事亦殺傷論格局男女二宫主刃貫同守乃子刃紫格必破家廟巳申旺午樂寅身命二宫值此主性毒狼狼好殺戳多在兵陣中刃死照是宫主殺伐之權會惡星傷殘會吉星居是宫主傷陷人有事不言能善絡廟與吉星同宫主兵權不免陣前落魄並主血疾陷地必遭杖辱徒配會吉星加紫凶自減半加庫貫有財多主自縊水渰大灾獸傷加印壽有疾方可不然夭折加文有權而孤加鸞因色害身加貴有權不善終加福禄不正全福加刑主惡亡加毛夭加姚主淫而夭加虛無實多詐加哭孤尅女人見之多虛產疾胎後異疾官禄宫主性剛暴不陷人遷移宫不宜見運限值之多桔栝横禍積善之家可免犯姚異淫夭别立宗風主庶出類男女身命不宜偵此歌曰子主色事有美人遇異呻吟勞碌奔波到底亦未甚善丑妖恠好師巫財寳旺田疇遇吉星減災殃遇㐫星主妖亡呪水書符恬不知耻寅因色喪身婦女死於淫男子性多愚蠢想是匹夫身主有禽獸瀆亂之行卯尅六親手是瘋疾刑妻害子遇惡星壽夭貧窮吉星亦常乎辰宫天禄足中限主奔波一生虛碌碌財禄有無多巳財禄耗散出外身亡子孫孤苦遇吉星可解逢㐫星必尅害其瑞甚微其禍甚大午孤暌午宫主好色妻宫通外人能廉禮節傷殘尅六親日下臨喪面前可見未六親尅害作事成敗遇吉星入來好惡曜見之終不能保守華而不實者矣申㐫伴不良有害則可也吉星當頭亦不能濟其災也福星臨而禍發以表人酉百中無正性作事多番覆性則無定準損害見刑酷戌天殃火星多財禄虛酉畏惡星限臨惡曜傷尅父母妻子壽促主灾疾亥亥宫須有害禄位得隂人貴高得寵位室璧盡忠清天刑星名曰天炮火星死符始始擊計都虛空火德天狗天權天害此星十名廼計都星異名與羅㬋星相對又曰天尾星士軍旅鈇鉞之事紫微面南爲車騎將帥之宿遇之則主豪福權貴忠義貫於日月節操凛於冰霜主官災論格局刑刃星兄弟宫名破鴈格同虛及居卯上名坐雷門格庙寅成旺酉樂午宫身命二宫主氣象好折人不平處照是宫主横死有善星救解亦主徒流若同紅貫廟旺非常且無獄禁之厄戌上百通失地主法死必然必主跛足背腰腿背異疾如得地吉禍輕會吉星加紫微得地聲價貴重失地亦主疾厄傷殘加貴顯逹加文昌人廟主孤加庫貫因財有名加印壽有權加鸞有文武之才加福禄無十分全加毛破相好武加杖有權如虛貧薄須有聲名多虛少實加異過房入贅有刃者徒配流刑加毛刃主天女人見之防尅夫損子外家凌替產厄虛怯之患加姚淫奔加異重婚再嫁加鸞福禄相夫有封贈加壽壽高官禄宫見吉遷移宫招水火賊盜之危運限流年值之主災耗子子宫主哀傷遇惡曜刑傷遭毒妨害短命六親主尅疾病連鄉丑丑宫多尅害貪財并破敗㐫限尅雙親少成多破敗寅主武寅居號虎威印禄廟廊居居寵臣安樂鴈塔必中書忌惡星沖男子傷妻子女性剛孤寡三十歲内少兒少年有濃血之災卯腰陀眼目疾刑害不能安僧道須當吉身孤命又單辰辰宫心地險封公遇貫虎蛇驚刑吊傷亡事要免遇吉星巳巳宫損妻子羅剛尅害豈非常成敗無期準生來性急剛午外死主夭折惡毒呪咀不良之人刑妻害子損六親宜重責己而輕責人未未宫凶吉兩相參妻兒定主兩三番六親有損須破祖離饗僧道壽宜長申申宫隂毒主刑傷父母初年定尅亡命限若無吉星助灾危成敗豈尋常酉酉宫必刑傷文武妻兒定尅亡幼年傷父母帶疾夭壽喪戌征伐靖邊時色戌宫禄星屬三方吉曜臨或名須自到無謀定有成亥亥宫孤虛禄文章尅世材驚天須動地天禄自然來天姚星名曰天淫玄娼主㕖將桃花主桃花揰釵風流妖誕之宿此星在垣局專主淫穢之事論格局居子位名花粹寳王格主淫亂廟卯戌旺辰樂亥身命二宫主性隂毒性亂多疑善顏色福淺之人若八廟旺却富貴多奴婢居亥上名登明之宫有絶世之才逢吉星則戀花酒會惡曜破家敗業因色犯刑亡身六合少年夭折若臨命陷嫁不用謀把手成親會吉星加壽有壽加庫財加紫剛柔相濟風流加貴多妄多嬪加鸞淫會㐫星㐫加刑刃天折損父母併妻兒兄弟宫鴈行失序加杖好色近貴多爲隸隸書寫之人加異業祖淫賤獨人加毛破祖淫或於人言不顧行加哭酷毒官禄宫多虛少實會陷人疾厄宫不宜見主異疾横傷因色酒損身運限逢之皆不宜入廟則吉人物美質俊秀性格風流狡猾多端機謀百壯常招是非及酒色奢華賭愽必占一也男子值之皆然女人加哭毛二星主自縊産傷判曰子吊客子宫主狡猾隂謀說夭孤女作風塵之賤婦損子及損夫丑哭臨丑宫威猛更端嚴文武清貴有剛權須逢惡曜有高貴九流醫術是高强此星用文武爲宰相列諧侯者逢惡沖破也作九流高士之人寅寅宫招罪青牢獄更官灾㐫星相犯照孤尅不聚財此星早傷父母帝疾壽促身命遭之不吉若得吉星相助福禄昌盛卯威猛更色慾加吉反爲福重重財禄旺又忌惡星觴辰破軍威猛之壯象三方遇惡星尅父母主竒食庶生倚親之命巳巳宫犯兵刃毒藥傷身命若遇天福天杖減一半女主鰥寡若遇紅鸞因色傷身死於他鄉午文章有風聲際會蔭豪名帛衣官顯客凶中化吉星貫索巫醫僧道未主風流血疾死亡身來官禄助亦夭遇紅鸞星可免一半申敗常亂家法先破後家成遇惡帶重疾身亡文毋華酉主人一生名標青史禄貴高遷酉宫號矢星金刃矢害身更加惡曜臨刑傷損六親主傷亡父母破敗孤尅家風戌因猛中而失職惡曜沖照官灾横惡此宫主孤貧非横惡事臨身亥亥官在隂邪家富盡消磨惡曜凶星照官灾產死多此宫如遇惡星男遭官灾女主產難之厄星行限吉凶論紫微星拱限主榮遷喜慶之事庶人營業增產學主名譽貴人加官進職僧道有清高之福婦人必旺夫家亥卯三方會吉星主面君之榮庶人發跡天虛天虛名無實星照限主利名耗虛危財帛難驟仍有虛驚空喜隂人小口哭泣孝服破財之事刑哭姚刃沖併主染蠱腫之病虛會刑殺併限者主招家暗凶事長吊官制凢事不吉主虛癆瘦弱亦主貧賤孤苦一生好事成空萬事到頭如夢天貴天貴星拱限喜氣非常無灾有吉文人及第官貴陞遷士庶發財僧道衣鉢充實女人遇此必主榮夫富資帛有封號彖曰貴星入限喜非常縱有灾厄亦吉昌文者遇之須及第官貴逢此入朝堂天印天印星拱限貴人主驟遷顯達士庶則創業興隆貴者主三印之權生殺之柄更在廟旺高强之宫管領軍民掌握兵權常人遇貴僧道清職不入局者居陷弱之宫亦主近貴發財彖曰運限如逢天印星遷除驟曜得光榮一官連管重重印職高權重播芳名天壽天壽星拱限凡事吉利更遇吉星主榮華顯達壽永灾消更須四破無侵多獲吉慶紅鸞紅鸞星拱限主財禄吉慶之事男子必招美婦女子必配良夫如會禄貴則榮華顯達如不入廟更加天異主公私破耗孝服不寧失脫横羅之事天庫天庫星拱限主發財更入廟旺方驟富之家開張鋪質常人亦發如無刑星舊發世推當代陶朱財鎭一坊人指當年倚頓彖曰天庫之宫中局中十年之内足財源更兼外位相逢好管取身膺王殿前貫索貫索星拱限主進財禄更在命宫廟旺會地主發天庫會之主得横財紅鸞拱之主發財亨利亦遇高賢薦擢三合會吉星亦主獲福三合文刑來拱主招詞頌㐫事若遇吉星拱合逢恩赦釋加惡曜主生離死别是非破家耗蕩盜賊損害回禄之事囊四方之利網羅六地之資彖曰貫索之星只主財吉星拱會自然來忽然歲限相逢着資庫還均數處開又曰貫禄之星寳上竒生來囊橐厚金資加之歲限相逢處財禄盈門喜展眉又文昌爲天福星拱限貴人面君士者展官庶人進田宅門庭光彩棟宇維新限到亥卯未宫亦驟發驟富僧道清高常人舊發女人臨此夫安子美于橐于囊遇貴禄星有封贈彖曰吉星相照號文昌士貴逢之姓字揚常人遇者增產業女流僧道值爲良天福天福星供限貴人面君仕者展官庶人進田宅門户清吉君子官禄陞遷重納喜慶財禄豐盈福禄駢集樂享高常王貴常人僧道亦主發財增福女人膺此福壽齊臨相夫益子彖曰限逢天福得安康改換門風家道昌錢財進益添人口定須創造置田庄天禄天禄照限主俄然舊願新謀事並圓災困徒流須會赦駁官君子受重宣商人暗覔生財利文武須持兩柄權到此人情皆慶賀經營遂意勝如前彖曰天禄宫中事稱情求官得遂禄豐盈更兼流歲紅鸞照十年之内貴無倫天杖天仗星拱限命主風瘦氣喘脚疾心疼之患寒熱嘔逆及跌蹀之災官撓之福凢事少順不寧之悔又主孝服口舌拮括若加刑刃主遭拘禁枷鎖無頭之禍不然亦主中風寒邪氣喘千正若在疾厄宫主有異疾罹巳凡所照者有害無益生災癬膿血之灾天異天異星拱限主產業分散孝服相仍及大刑小併宅下詫異禍事若加天姚主移徙破耗公訟牽繼之事加惡星主傷命公治之如入廟者主灾悔三方有吉星不爲害毛頭毛頭照限主災病官刑及移徙不寧水火盜賤之災如虛哭星釣合主瘟疫瘡毒膿血湯火之傷回禄之恐又忌刑星併冲不利少吉多凶破耗孝服死亡若限廟旺之地加善星者主當貴及有出師鈇鉞兵民之推不入廟旺者所以災禍不利之事三方有吉星拱會而無害也彖曰天彗毛頭不可當多生災病主瘟黃或然歲歲限皆臨此急去祈求作保天刑天刑星拱限主官殃不測之災及刑獄之福主破財并併陷水厄刑父母尅弟兄加姚異刃星主耳目昏疼并血光之咎加哭星主驚恐災疾人離財散之禍加天杖主官刑不吉之事會惡曜沖併主腰駝背曲手足耳目異端之患及五臟不寧瘋疾氣喘之災與吉星同宫者可變惡爲祥如會㐫刑刃哭虛星者主夭亡也天刃天刃星拱照主灾禍破財之事不利父母妻兒主災咎刑併瘡疥血光異疾傷損之悔女人主產厄之災惡毒癰疽之證宜守困切莫進身謀望亦主人口災傷孝服重則傷亡及損壽正照并對照皆主厄難名利身亡亦忌刑星中併招㐫禍等事限内併㐫星太歲三合并惡星入局者八口之家亡七口其驗如神天姚天姚星照限在水厄之災若加天異主災胞破財敗壞異端禍事生隂人荼毒勾絆閑非如入廟者變㐫爲吉若加惡星定主夭亡彖曰運遇天姚歲限同更兼身命會紅鸞無心自遇隂人喜情意相投事事歡天哭天哭星照限又遇流年惡曜命不可逃如三方拱照必主外孝服見主死三方對合爲浪濤之宿照身官爲黄泉星三方照限爲浪濤限彖曰波濤浪理十年中便是王孫莫要逢正照傍照皆不吉刑及相逢壽必終此星正照傍照皆主危厄更逢哭虛相會主疫非常官事㐫災刑杖刃沖併不得地者主夭亡若哭異相逢主遷徙流耗公訟官災不測之事若哭異姚相會者主失脫破財非横之事重者㐫惡惟巳紫微斗數卷之三終
